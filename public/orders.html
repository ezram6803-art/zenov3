<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Saya — Zeno Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-wrap { position:relative; z-index:1; padding:100px 20px 60px; max-width:900px; margin:0 auto; }
        .page-title { font-family:'Exo 2',sans-serif; font-size:clamp(1.6rem,4vw,2.2rem); font-weight:900; margin-bottom:6px; }
        .page-sub { color:var(--text2); font-size:0.88rem; margin-bottom:28px; }

        .filter-tabs { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
        .tab-btn {
            padding:7px 18px; border-radius:20px; font-family:'Sora',sans-serif;
            font-size:0.8rem; font-weight:700; cursor:pointer; transition:all 0.2s;
            border:1px solid var(--border2); background:transparent; color:var(--muted);
        }
        .tab-btn.active, .tab-btn:hover { background:var(--blue); color:#fff; border-color:var(--blue); }

        .order-card {
            background:var(--card); border:1px solid var(--border2);
            border-radius:12px; margin-bottom:12px; overflow:hidden;
            transition:border-color 0.2s;
        }
        .order-card:hover { border-color:rgba(59,130,246,0.3); }
        .order-head {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 18px; border-bottom:1px solid var(--border2);
            flex-wrap:wrap; gap:8px;
        }
        .order-id-txt { font-family:'Exo 2',sans-serif; font-size:0.85rem; font-weight:800; color:var(--blue-bright); }
        .order-date { font-size:0.75rem; color:var(--muted); }
        .order-body { padding:16px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
        .order-icon { font-size:2rem; flex-shrink:0; }
        .order-info { flex:1; min-width:180px; }
        .order-name { font-weight:700; font-size:0.95rem; color:var(--text); margin-bottom:3px; }
        .order-method { font-size:0.78rem; color:var(--muted); }
        .order-right { text-align:right; }
        .order-price { font-family:'Exo 2',sans-serif; font-size:1.05rem; font-weight:900; color:var(--blue-bright); margin-bottom:4px; }

        .order-foot {
            padding:12px 18px; background:rgba(0,0,0,0.2);
            border-top:1px solid var(--border2);
            display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:8px;
        }
        .status-info { font-size:0.8rem; color:var(--text2); }

        .timeline { padding:16px 18px 0; border-top:1px solid var(--border2); display:none; }
        .tl-item { display:flex; gap:12px; margin-bottom:14px; }
        .tl-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:4px; }
        .tl-dot.done { background:var(--success); }
        .tl-dot.active { background:var(--blue-bright); box-shadow:0 0 0 3px rgba(59,130,246,0.2); }
        .tl-dot.pending { background:var(--border2); }
        .tl-text { font-size:0.82rem; color:var(--text2); }
        .tl-text strong { color:var(--text); font-size:0.88rem; display:block; margin-bottom:2px; }

        .empty-box { text-align:center; padding:60px 20px; color:var(--muted); background:var(--card); border:1px dashed var(--border2); border-radius:12px; }
        .empty-box .big { font-size:3rem; margin-bottom:10px; }
        .empty-box p { font-size:0.88rem; margin-bottom:16px; }

        .upload-mini { display:flex; align-items:center; gap:8px; }
        .upload-mini input { display:none; }
        .btn-upload { padding:6px 14px; background:var(--blue); color:#fff; border:none; border-radius:6px; font-size:0.78rem; font-weight:700; cursor:pointer; }
    </style>
</head>
<body>
    <div class="glow-blue"></div>
    <nav>
        <a href="/" class="nav-logo">ZENO<span>STORE</span></a>
        <ul class="nav-links">
            <li><a href="/products">Produk</a></li>
            <li><a href="/orders" style="color:var(--blue-bright)">Pesanan</a></li>
        </ul>
        <div class="nav-buttons" id="navButtons"></div>
    </nav>

    <div class="page-wrap">
        <div class="section-tag">// Riwayat</div>
        <h1 class="page-title">PESANAN SAYA</h1>
        <p class="page-sub">Pantau status semua pesanan kamu di sini</p>

        <div class="filter-tabs">
            <button class="tab-btn active" onclick="filterOrders('all',this)">Semua</button>
            <button class="tab-btn" onclick="filterOrders('pending',this)">⏳ Menunggu</button>
            <button class="tab-btn" onclick="filterOrders('confirming',this)">🔍 Dikonfirmasi</button>
            <button class="tab-btn" onclick="filterOrders('paid',this)">✅ Selesai</button>
        </div>

        <div id="orderList">
            <div class="empty-box"><div class="big">⏳</div><p>Memuat pesanan...</p></div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('zenoUser') || 'null');
        if (!user) window.location.href = '/login';

        document.getElementById('navButtons').innerHTML = `
            <span class="nav-user">👤 ${user.username}</span>
            <a href="/dashboard" class="btn-sm btn-solid-sm">Dashboard</a>
            <button class="btn-sm btn-outline-sm" onclick="logout()">Logout</button>`;

        function logout() { localStorage.removeItem('zenoUser'); location.href='/'; }

        let allOrders = [];
        let currentFilter = 'all';

        function getStatusBadge(status) {
            const map = {
                pending: ['badge-warning','⏳ Menunggu Bukti'],
                confirming: ['badge-blue','🔍 Dikonfirmasi'],
                paid: ['badge-success','✅ Selesai'],
                cancelled: ['badge-error','❌ Dibatalkan']
            };
            return map[status] || map['pending'];
        }

        function getStatusMsg(status) {
            const map = {
                pending: 'Upload bukti pembayaran untuk melanjutkan pesanan.',
                confirming: 'Bukti pembayaran diterima. Admin sedang mengkonfirmasi (maks 1x24 jam).',
                paid: 'Pesanan selesai! Terima kasih sudah berbelanja di Zeno Store.',
                cancelled: 'Pesanan dibatalkan.'
            };
            return map[status] || '';
        }

        function getCatIcon(name) {
            const n = name.toLowerCase();
            if (n.includes('plugin')||n.includes('cheat')||n.includes('faction')||n.includes('economy')||n.includes('essential')) return '🔌';
            if (n.includes('resource')||n.includes('map')||n.includes('particle')) return '🎨';
            if (n.includes('backup')) return '💾';
            return '🌐';
        }

        function getTimeline(order) {
            const steps = [
                { label:'Pesanan Dibuat', done: true, time: new Date(order.createdAt).toLocaleString('id-ID') },
                { label:'Bukti Dikirim', done: order.status !== 'pending', time: order.confirmedAt ? new Date(order.confirmedAt).toLocaleString('id-ID') : '' },
                { label:'Dikonfirmasi Admin', done: order.status === 'paid', time: order.approvedAt ? new Date(order.approvedAt).toLocaleString('id-ID') : '' },
                { label:'Selesai', done: order.status === 'paid', time: '' },
            ];
            return steps.map((s, i) => {
                const dotClass = s.done ? 'done' : (i === steps.findIndex(x => !x.done) ? 'active' : 'pending');
                return `<div class="tl-item">
                    <div class="tl-dot ${dotClass}"></div>
                    <div class="tl-text"><strong>${s.label}</strong>${s.time ? s.time : (s.done ? '' : 'Menunggu...')}</div>
                </div>`;
            }).join('');
        }

        function renderOrders(orders) {
            const list = document.getElementById('orderList');
            if (orders.length === 0) {
                list.innerHTML = `<div class="empty-box"><div class="big">📭</div><p>Tidak ada pesanan ${currentFilter !== 'all' ? 'dengan status ini' : ''}</p><a href="/products" class="btn btn-primary">Belanja Sekarang</a></div>`;
                return;
            }
            list.innerHTML = orders.slice().reverse().map(o => {
                const [badgeClass, badgeLabel] = getStatusBadge(o.status);
                const date = new Date(o.createdAt).toLocaleDateString('id-ID', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
                const payMethod = o.paymentMethod === 'dana' ? '💙 Dana' : '🏦 Transfer Bank';
                return `
                <div class="order-card">
                    <div class="order-head">
                        <div>
                            <div class="order-id-txt">${o.orderId}</div>
                            <div class="order-date">${date}</div>
                        </div>
                        <span class="badge ${badgeClass}">${badgeLabel}</span>
                    </div>
                    <div class="order-body">
                        <div class="order-icon">${getCatIcon(o.productName)}</div>
                        <div class="order-info">
                            <div class="order-name">${o.productName}</div>
                            <div class="order-method">${payMethod}</div>
                        </div>
                        <div class="order-right">
                            <div class="order-price">${o.price}</div>
                        </div>
                    </div>
                    <div class="timeline" id="tl-${o.orderId}">
                        ${getTimeline(o)}
                    </div>
                    <div class="order-foot">
                        <div class="status-info">${getStatusMsg(o.status)}</div>
                        <div style="display:flex;gap:8px;align-items:center;">
                            <button class="tab-btn" onclick="toggleTimeline('${o.orderId}')" style="padding:5px 12px;font-size:0.75rem;">Detail</button>
                            ${o.status === 'pending' ? `<a href="/checkout?id=${o.productId}" class="btn-upload">Upload Bukti</a>` : ''}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleTimeline(id) {
            const el = document.getElementById('tl-' + id);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function filterOrders(status, btn) {
            currentFilter = status;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = status === 'all' ? allOrders : allOrders.filter(o => o.status === status);
            renderOrders(filtered);
        }

        async function loadOrders() {
            try {
                const res = await fetch('/api/orders/' + user.userId);
                const data = await res.json();
                allOrders = data.orders || [];
                renderOrders(allOrders);
            } catch {
                document.getElementById('orderList').innerHTML = '<div class="empty-box"><div class="big">⚠️</div><p>Gagal memuat pesanan. Coba refresh.</p></div>';
            }
        }

        loadOrders();
    </script>
    <script src="/navbar.js"></script>
    <script>initNavbar("orders");</script>
</body>
</html>
